services:
  proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/keys:/etc/nginx/keys
    ports:
      - 8443:8443
    depends_on:
      - frontend
      - backend

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0
      "

  backend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - database
      - mosquitto
    command: >
      sh -c "
        npm install &&
        npx prisma generate &&
        npm run dev
      "

  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "8883:8883"

    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/certs:/mosquitto/certs:ro
    restart: always

  database:
    image: mysql:8.4
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: database
      MYSQL_USER: user
      MYSQL_PASSWORD: password
